<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ea580c">
  <title>파트너스 활동 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap');
    body { font-family: 'Pretendard', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; }
    .hidden-view { display: none !important; }
    .fade-in { animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .btn-loading { pointer-events: none; opacity: 0.6; }
  </style>
</head>
<body class="flex justify-center items-center min-h-screen sm:p-4">

  <div class="w-full h-[100vh] sm:h-[850px] sm:max-w-md bg-white sm:rounded-[2rem] sm:shadow-2xl overflow-hidden flex flex-col relative shadow-inner">

    <!-- 로그인 화면 -->
    <div id="view-login" class="flex flex-col items-center justify-center h-full p-8 fade-in bg-[#f8fafc]">
      <div class="w-24 h-24 bg-[#ea580c] rounded-3xl flex items-center justify-center shadow-lg mb-8"><i data-lucide="calendar" class="w-12 h-12 text-white"></i></div>
      <div class="text-center space-y-2 mb-12"><h1 class="text-2xl font-bold text-gray-800">파트너스 활동 관리</h1><p class="text-gray-500 text-sm mt-2">영업 활동을 스마트하게 기록하세요.</p></div>
      <div class="w-full space-y-3">
        <button onclick="selectLoginMode(false)" class="w-full bg-white border border-gray-300 text-gray-700 font-bold py-4 px-4 rounded-xl shadow-sm flex items-center justify-center space-x-3 active:scale-95 transition">
          <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5"/><span>Google 계정으로 시작하기</span>
        </button>
        <button onclick="selectLoginMode(true)" class="w-full bg-slate-100 text-slate-600 font-bold py-4 px-4 rounded-xl shadow-sm flex items-center justify-center active:scale-95 transition text-sm">
          구글계정 연결없이 사용하기 (수동입력)
        </button>
      </div>
    </div>

    <!-- 기본 정보 입력 화면 -->
    <div id="view-setup" class="hidden-view flex flex-col h-full p-6 fade-in bg-white">
      <h2 class="text-2xl font-bold text-gray-900 mb-8 mt-4">기본 정보 입력</h2>
      <div class="space-y-5 flex-1">
        <div><label class="block text-sm font-bold text-gray-700 mb-2">파트너 이름</label><input type="text" id="inputName" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none"></div>
        <div><label class="block text-sm font-bold text-gray-700 mb-2">파트너 사번</label><input type="text" id="inputEmpId" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none"></div>
        <div id="emailInputWrap"><label class="block text-sm font-bold text-gray-700 mb-2">구글 계정 (이메일)</label><input type="email" id="inputEmail" placeholder="example@gmail.com" class="w-full px-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm"></div>
        <button onclick="verifyPartner()" id="btnVerify" class="w-full bg-[#1e293b] text-white font-bold py-3.5 rounded-xl shadow-md active:scale-95 transition mt-2">소속 정보 확인</button>
        <div id="affiliationInfo" class="hidden-view bg-[#f8fafc] p-4 rounded-xl border border-slate-200 flex items-center space-x-3"><i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-600"></i><div><p class="text-[11px] font-bold text-slate-500">인증 완료</p><p id="affiliationText" class="text-sm font-bold text-slate-800 mt-0.5">소속: -</p></div></div>
      </div>
      <button id="btnStart" disabled onclick="startApp()" class="w-full bg-gray-300 text-white font-bold py-4 rounded-xl mt-4 transition">시작하기</button>
    </div>

    <!-- 메인 앱 헤더 -->
    <div id="view-app-header" class="bg-white px-6 py-4 rounded-b-3xl shadow-sm z-10 flex justify-between items-center border-b border-slate-100 hidden-view">
      <div>
        <h2 class="text-lg font-bold text-gray-900"><span id="displayName">파트너</span>님, 환영합니다</h2>
        <div class="flex items-center text-[10px] font-bold text-emerald-600 mt-1" id="syncStatusMsg">데이터 연동 대기중...</div>
      </div>
      <div class="flex items-center space-x-2">
        <div class="text-right"><div class="text-sm font-bold text-slate-800" id="headerWeek">0주차</div><div class="text-[10px] font-medium text-slate-500" id="headerDate">YYYY-MM-DD(요일)</div></div>
        <button onclick="manualReload()" class="p-1.5 rounded-full bg-orange-50 active:scale-90 transition cursor-pointer"><i data-lucide="refresh-cw" id="headerReloadIcon" class="w-5 h-5 text-[#ea580c]"></i></button>
      </div>
    </div>

    <!-- 메인 컨텐츠 영역 -->
    <div class="flex-1 overflow-y-auto p-4 pb-24 relative" id="mainContentArea">
      
      <!-- [탭 0] 홈 대시보드 (여백 p-2 적용) -->
      <div id="tab-home" class="hidden-view fade-in p-2 space-y-6">
        <section>
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-[16px] text-slate-800 border-l-4 border-[#ea580c] pl-2">이번 주 활동 진도 (목표 대비)</h3>
            <p class="text-[10px] text-slate-400">설정된 목표 기준</p>
          </div>
          <div id="home-progress-container" class="bg-white rounded-2xl p-5 shadow-sm border border-slate-100 space-y-5">
            <p class="text-center text-slate-400 py-8 text-xs">데이터 로딩 중...</p>
          </div>
        </section>

        <section>
          <div class="flex items-center justify-between mb-4 mt-6">
            <h3 class="font-bold text-[16px] text-slate-800 border-l-4 border-blue-600 pl-2">다음 주 활동 예정 현황</h3>
            <p class="text-[10px] text-slate-400" id="homeNextWeekLabel">0주차</p>
          </div>
          <div id="home-next-status" class="grid grid-cols-2 gap-3 pb-4"></div>
        </section>
      </div>

      <!-- [탭 1] 활동 기록 (여백 p-2 적용) -->
      <div id="tab-activity" class="hidden-view fade-in p-2"><div id="cardsContainer"></div></div>
      
      <!-- [탭 2] 통계 (여백 p-2 적용) -->
      <div id="tab-stats" class="hidden-view fade-in p-2">
        <div class="flex justify-between items-start" style="margin-top: 4px;">
          <p class="text-[11px] text-slate-500 leading-relaxed flex-1">누적 활동 결과에 따른 통계입니다.<br>활동관리에 참고하시기 바랍니다.</p>
          <select id="statsPeriod" onchange="loadStatsData()" class="w-24 ml-2 text-[11px] bg-white border border-slate-200 rounded-lg px-1 py-1.5 outline-none font-bold text-slate-700 shadow-sm focus:ring-2 focus:ring-blue-500 text-center">
            <option value="50">직전 50주</option>
            <option value="25">직전 25주</option>
            <option value="12">직전 12주</option>
            <option value="4">직전 4주</option>
          </select>
        </div>
        <div style="height: 36px;"></div>
        <h3 class="font-bold text-[15px] text-slate-800 border-l-4 border-[#ea580c] pl-2">활동 예정 대비 결과 확률</h3>
        <div id="statsGrid" class="mt-3"></div>

        <div style="height: 48px;"></div>
        <h3 class="font-bold text-[15px] text-slate-800 border-l-4 border-blue-600 pl-2">나의 활동 간 확률</h3>
        <div id="convGrid" class="grid grid-cols-2 gap-3 mt-3"></div>
      </div>

      <!-- [탭 3] 설정 (기존부터 p-2 존재) -->
      <div id="tab-settings" class="hidden-view fade-in p-2 space-y-4">
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm text-center relative">
           <p class="text-xs font-bold text-slate-500 mb-1">인증된 파트너 정보</p>
           <p class="text-xl font-bold text-slate-900 mt-2" id="settingName">-</p>
           <p class="text-sm font-bold text-[#ea580c] mt-1 mb-4" id="settingTeam">-</p>
           
           <!-- 구글 계정 및 캘린더 공유 섹션 -->
           <div id="settingEmailBlock" class="bg-slate-50 rounded-xl p-3 border border-slate-100 mb-4 text-left">
             <p class="text-[10px] font-bold text-slate-400 mb-1">연동된 구글 계정</p>
             <div class="flex items-center justify-between mb-2">
               <p class="text-sm font-bold text-slate-700" id="settingEmail">-</p>
               <button onclick="editEmail()" class="text-[10px] text-blue-500 font-bold px-2 py-1 rounded bg-blue-50">수정</button>
             </div>
             <button onclick="shareCalendar()" class="w-full bg-[#1e293b] text-white font-bold py-2.5 rounded-lg active:scale-95 transition text-xs flex items-center justify-center space-x-2 mt-2">
               <i data-lucide="share-2" class="w-3.5 h-3.5"></i><span>활동관리앱 계정에 캘린더 공유하기</span>
             </button>
           </div>

           <hr class="my-5 border-slate-100">
           <button onclick="logout()" class="w-full bg-slate-100 text-slate-700 font-bold py-3 rounded-xl active:scale-95 text-sm">로그아웃</button>
        </div>
        
        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm">
          <h3 class="font-bold mb-4 border-b pb-2 text-[15px]">나의 주간 활동 목표</h3>
          <div id="goalInputs" class="grid grid-cols-3 gap-3 mb-4"></div>
          <div class="grid grid-cols-2 gap-3 mb-5">
            <div><p class="text-[10px] font-bold text-emerald-700 mb-1 text-center">활동계(자동)</p><input type="number" id="goal_활동계" readonly class="w-full text-center py-2 bg-emerald-50 border border-emerald-200 rounded-lg font-bold outline-none text-emerald-800"></div>
            <div><p class="text-[10px] text-center font-bold text-slate-500 mb-1">보험료</p><input type="text" id="goal_보험료" oninput="formatCurrency(this)" class="w-full text-center py-2 border rounded-lg font-bold outline-none text-slate-800"></div>
          </div>
          <button onclick="saveUserGoals()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl text-sm shadow-md">목표 저장하기</button>
        </div>
      </div>
    </div>

    <!-- 하단 내비게이션 -->
    <div id="view-nav" class="absolute bottom-0 w-full bg-white border-t border-gray-200 flex justify-around pb-6 pt-3 sm:rounded-b-[2rem] hidden-view">
      <button onclick="switchTab('tab-home', this)" class="nav-btn flex flex-col items-center text-[#ea580c]"><i data-lucide="home" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-bold">홈</span></button>
      <button onclick="switchTab('tab-activity', this)" class="nav-btn flex flex-col items-center text-gray-400"><i data-lucide="calendar" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-bold">활동 기록</span></button>
      <button onclick="switchTab('tab-stats', this)" class="nav-btn flex flex-col items-center text-gray-400"><i data-lucide="bar-chart-2" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-bold">통계</span></button>
      <button onclick="switchTab('tab-settings', this)" class="nav-btn flex flex-col items-center text-gray-400"><i data-lucide="settings" class="w-6 h-6 mb-1"></i><span class="text-[10px] font-bold">설정</span></button>
    </div>
  </div>

  <script>
    lucide.createIcons();
    const API_URL = "https://script.google.com/macros/s/AKfycbzMULbAaJw6HUBnKlALwgfV08uv3D4Su6JPbMnLPQ0F3sXb_CjJcTl9GBlJB2TAHHXs/exec";

    let globalData = { isManualMode: false, goals: {}, email: "" };
    let weekContext = {}; let lastFetchedData = null; let isWeekSaved = false; let isWeekClosed = false; let statsCache = {};
    const stages = ['TA', 'AP', 'P', 'C', 'N', '소개'];

    async function callApi(data) {
      try {
        const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(data) });
        return await response.json();
      } catch (err) { alert("서버 연결 실패. URL을 확인하세요."); return null; }
    }

    window.onload = function() {
      const savedUser = localStorage.getItem('partnersAppUser');
      if (savedUser) { globalData = JSON.parse(savedUser); setupUserSettings(); showApp(); initActivityScreen(); }
    };

    function showApp() { 
      document.getElementById('view-login').classList.add('hidden-view');
      document.getElementById('view-setup').classList.add('hidden-view');
      document.getElementById('view-app-header').classList.remove('hidden-view');
      document.getElementById('view-nav').classList.remove('hidden-view');
      switchTab('tab-home', document.querySelector('.nav-btn'));
    }

    function selectLoginMode(isManual) { 
      globalData.isManualMode = isManual; 
      if (isManual) document.getElementById('emailInputWrap').classList.add('hidden-view');
      else document.getElementById('emailInputWrap').classList.remove('hidden-view');
      switchView('view-setup'); 
    }
    
    function switchView(id) { document.querySelectorAll('div[id^="view-"]').forEach(el => el.classList.add('hidden-view')); document.getElementById(id).classList.remove('hidden-view'); }

    async function verifyPartner() {
      const name = document.getElementById('inputName').value;
      const empId = document.getElementById('inputEmpId').value;
      const email = document.getElementById('inputEmail').value;
      if (!name || !empId) return;
      if (!globalData.isManualMode && !email) { alert("구글 계정(이메일)을 입력해주세요."); return; }

      document.getElementById('btnVerify').innerText = "확인 중...";
      const res = await callApi({ action: 'verify', name, empId, email });
      if(res && res.success) {
        globalData.name = name; globalData.empId = empId; globalData.teamName = res.teamName; globalData.email = email;
        
        if(res.goals && Object.keys(res.goals).length > 0) {
           globalData.goals = res.goals;
        }

        document.getElementById('affiliationText').innerText = `소속: ${res.teamName}`;
        document.getElementById('affiliationInfo').classList.remove('hidden-view');
        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStart').classList.replace('bg-gray-300', 'bg-[#ea580c]');
      } else alert(res ? res.message : "인증 실패");
      document.getElementById('btnVerify').innerText = "소속 정보 확인";
    }

    function startApp() { 
      localStorage.setItem('partnersAppUser', JSON.stringify(globalData)); 
      setupUserSettings(); 
      showApp(); 
      
      if (!globalData.isManualMode) {
        alert("[안내] 원활한 활동 관리를 위해\n[설정] 탭으로 이동하여 '활동관리앱 계정에 캘린더 공유하기' 버튼을 눌러 계정 공유(필수)를 진행해 주시기 바랍니다.");
      }

      initActivityScreen(); 
    }

    function logout() { localStorage.removeItem('partnersAppUser'); location.reload(); }

    function setupUserSettings() {
      document.getElementById('displayName').innerText = globalData.name;
      document.getElementById('settingName').innerText = `${globalData.name} (${globalData.empId})`;
      document.getElementById('settingTeam').innerText = globalData.teamName || '-';
      
      if (globalData.isManualMode) {
        document.getElementById('settingEmailBlock').style.display = 'none';
      } else {
        document.getElementById('settingEmailBlock').style.display = 'block';
        document.getElementById('settingEmail').innerText = globalData.email || '미입력';
      }

      let goalHtml = stages.map(s => `<div class="text-center"><p class="text-[11px] font-bold text-slate-500 mb-1">${s}</p><input type="number" id="goal_${s}" oninput="calcGoalSum()" class="w-full text-center py-2 bg-slate-50 border border-slate-200 rounded-lg font-bold text-slate-800 outline-none focus:ring-2 focus:ring-orange-500" value="${globalData.goals[s]||''}"></div>`).join('');
      document.getElementById('goalInputs').innerHTML = goalHtml;
      document.getElementById('goal_활동계').value = globalData.goals['활동계'] || '';
      document.getElementById('goal_보험료').value = globalData.goals['보험료'] || '';
    }

    async function editEmail() {
      const newEmail = prompt("변경할 구글 이메일을 입력해주세요.", globalData.email);
      if (newEmail !== null && newEmail.trim() !== "") {
        const tempEmail = newEmail.trim();
        const res = await callApi({ action: 'updateEmail', empId: globalData.empId, email: tempEmail });
        
        if (res && res.success) {
          globalData.email = tempEmail;
          document.getElementById('settingEmail').innerText = globalData.email;
          localStorage.setItem('partnersAppUser', JSON.stringify(globalData));
          alert("이메일이 수정되었습니다. '활동 기록' 탭에서 새로고침을 눌러 연동을 확인하세요.");
        } else {
          alert("서버 오류로 이메일을 수정하지 못했습니다.");
        }
      }
    }

    function shareCalendar() {
      const targetEmail = 'lp.yspark@gmail.com';
      navigator.clipboard.writeText(targetEmail).then(() => {
        alert(`활동관리앱 계정(${targetEmail})이 클립보드에 복사되었습니다.\n\n[확인]을 누르시면 구글 캘린더 설정 화면으로 이동합니다.\n\n1. 본인의 공유할 캘린더 이름을 선택\n2. '공유 대상'에서 '사용자 및 그룹 추가' 버튼 클릭\n3. '특정 사용자와 공유' 창에서,\n4. 복사된 주소를 붙여넣고 '모든 일정 세부정보 보기' 권한을 선택후 '보내기' 버튼 클릭하면\n5. 활동관리앱 계정으로 공유알림 메일이 발송됩니다.`);
        window.open('https://calendar.google.com/calendar/r/settings', '_blank');
      }).catch(err => {
        alert("클립보드 복사에 실패했습니다. 'lp.yspark@gmail.com'을 직접 입력해주세요.");
        window.open('https://calendar.google.com/calendar/r/settings', '_blank');
      });
    }

    function calcGoalSum() { let sum = 0; stages.forEach(s => sum += parseInt(document.getElementById(`goal_${s}`).value) || 0); document.getElementById('goal_활동계').value = sum; }
    
    async function saveUserGoals() {
      const newGoals = {};
      stages.forEach(s => newGoals[s] = document.getElementById(`goal_${s}`).value);
      newGoals['활동계'] = document.getElementById('goal_활동계').value;
      newGoals['보험료'] = document.getElementById('goal_보험료').value;
      
      globalData.goals = newGoals;
      localStorage.setItem('partnersAppUser', JSON.stringify(globalData));
      
      const res = await callApi({
        action: 'saveGoals',
        empId: globalData.empId, name: globalData.name, teamName: globalData.teamName,
        goals: newGoals
      });

      if(res && res.success) {
        alert("목표가 저장되었습니다."); renderHomeDashboard();
      } else {
        alert("목표를 DB에 저장하는 중 오류가 발생했습니다.");
      }
    }

    function calculateCustomWeek() {
      const today = new Date(); const days = ['일', '월', '화', '수', '목', '금', '토'];
      let base = new Date(today); if (today.getDay() === 1) base.setDate(base.getDate() - 1);
      base.setHours(0,0,0,0); base.setDate(base.getDate() + 3 - (base.getDay() + 6) % 7);
      const week1 = new Date(base.getFullYear(), 0, 4);
      const currWeek = Math.round(((base.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7) + 1;
      const mon = new Date(base); mon.setDate(mon.getDate() - (mon.getDay() || 7) + 1);
      const nextMon = new Date(mon); nextMon.setDate(nextMon.getDate() + 7);
      return { todayStr: today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0')+'('+days[today.getDay()]+')', currYear: base.getFullYear(), currWeek, currMonday: mon.toISOString().split('T')[0], nextYear: nextMon.getFullYear(), nextWeek: (currWeek>=52?1:currWeek+1), nextMonday: nextMon.toISOString().split('T')[0] };
    }

    function formatCurrency(el) { let v = el.value.replace(/[^0-9]/g, ''); el.value = v ? parseInt(v, 10).toLocaleString() : ''; }

    function buildCardHtml(id, week, date, type, expanded, color) {
      let html = `<div class="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm mb-4 transition-all"><div class="bg-slate-50 px-4 py-3 flex justify-between items-center cursor-pointer" onclick="toggleCard('${id}')"><span class="font-bold text-slate-800">${week}주차 <span class="text-xs font-normal text-slate-500 ml-1">${date}</span></span><span class="text-sm font-bold ${color}">${type} <i data-lucide="${expanded?'chevron-up':'chevron-down'}" id="icon-${id}" class="w-4 h-4 inline"></i></span></div><div id="body-${id}" class="p-4 ${expanded?'':'hidden-view'}"><div class="grid grid-cols-3 gap-3 mb-4">`;
      stages.forEach(s => html += `<div class="text-center"><p class="text-[11px] font-bold text-slate-500 mb-1">${s}</p><input type="number" id="input_${id}_${s}" oninput="calcSum('${id}')" class="w-full text-center py-2 bg-slate-50 border border-slate-200 rounded-lg font-bold outline-none"></div>`);
      html += `</div><div class="grid grid-cols-2 gap-3 mb-4"><div class="bg-emerald-50 rounded-lg p-3 flex flex-col items-center justify-center border border-emerald-100"><p class="text-[10px] font-bold text-emerald-700 mb-1">활동계</p><span id="sum_${id}" class="text-lg font-bold text-emerald-900">0</span></div><div><p class="text-[10px] text-center font-bold text-slate-500 mb-1">보험료</p><input type="text" id="input_${id}_보험료" oninput="formatCurrency(this)" class="w-full text-center py-2.5 border border-slate-200 bg-slate-50 rounded-lg font-bold outline-none"></div></div>`;
      if (id === 'currActual') html += `<button id="btn-save" onclick="handleWeeklyAction('save')" class="w-full bg-slate-800 text-white font-bold py-3.5 rounded-xl transition text-sm shadow-md">주초 마감하기 (저장하기)</button>`;
      if (id === 'nextPlan') html += `<button id="btn-close" onclick="handleWeeklyAction('close')" class="w-full bg-[#ea580c] text-white font-bold py-3.5 rounded-xl transition text-sm shadow-md">주 마감하기 (저장하기)</button>`;
      return html + `</div></div>`;
    }

    function toggleCard(id) { let b = document.getElementById(`body-${id}`); let ic = document.getElementById(`icon-${id}`); b.classList.toggle('hidden-view'); ic.setAttribute('data-lucide', b.classList.contains('hidden-view')?'chevron-down':'chevron-up'); lucide.createIcons(); }
    function calcSum(id) { let s = 0; stages.forEach(st => s += parseInt(document.getElementById(`input_${id}_${st}`).value) || 0); document.getElementById(`sum_${id}`).innerText = s; }

    async function initActivityScreen() {
      weekContext = calculateCustomWeek();
      document.getElementById('headerWeek').innerText = `${weekContext.currWeek}주차`;
      document.getElementById('headerDate').innerText = weekContext.todayStr;
      document.getElementById('homeNextWeekLabel').innerText = `${weekContext.nextWeek}주차 (${weekContext.nextMonday})`;
      document.getElementById('cardsContainer').innerHTML = buildCardHtml('currPlan', weekContext.currWeek, weekContext.currMonday, '예정', false, 'text-blue-600') + buildCardHtml('currActual', weekContext.currWeek, weekContext.currMonday, '결과', true, 'text-[#ea580c]') + buildCardHtml('nextPlan', weekContext.nextWeek, weekContext.nextMonday, '예정', true, 'text-blue-600');
      lucide.createIcons(); await loadActivityData();
    }

    async function manualReload() { statsCache = {}; await loadActivityData(); }

    async function loadActivityData() {
      document.getElementById('headerReloadIcon').classList.add('animate-spin');
      const res = await callApi({ 
        action: 'getData', empId: globalData.empId, name: globalData.name, teamName: globalData.teamName, email: globalData.email,
        currYear: weekContext.currYear, currWeek: weekContext.currWeek, nextYear: weekContext.nextYear, nextWeek: weekContext.nextWeek, isManualMode: globalData.isManualMode 
      });
      document.getElementById('headerReloadIcon').classList.remove('animate-spin');
      
      if(res) {
        lastFetchedData = res; isWeekSaved = res.isSaved; isWeekClosed = res.isClosed;
        fillCardData('currPlan', res.currPlan); fillCardData('currActual', res.currActual); fillCardData('nextPlan', res.nextPlan);
        updateButtonStates(); renderHomeDashboard(); prefetchStatsData();

        if (res.calError) {
          alert("캘린더 데이터를 불러오지 못했습니다.\n[설정] 탭에서 '활동관리앱 계정에 캘린더 공유하기'를 완료해 주세요.");
          document.getElementById('syncStatusMsg').innerHTML = `<div class="w-2 h-2 rounded-full bg-red-500 mr-1.5"></div> 공유 대기중`;
        } else {
          document.getElementById('syncStatusMsg').innerHTML = `<div class="w-2 h-2 rounded-full bg-emerald-500 mr-1.5"></div> 바인딩 완료`;
        }
      }
    }

    function fillCardData(id, obj) {
      stages.forEach(s => { let input = document.getElementById(`input_${id}_${s}`); input.value = obj[s] || ''; input.disabled = isWeekClosed; });
      let prm = document.getElementById(`input_${id}_보험료`); prm.value = obj['보험료'] || ''; prm.disabled = isWeekClosed; formatCurrency(prm); calcSum(id);
    }

    function updateButtonStates() {
      const btnSave = document.getElementById('btn-save'); const btnClose = document.getElementById('btn-close');
      if (!btnSave || !btnClose) return;
      if (isWeekClosed) {
        btnSave.style.display = 'none'; btnClose.innerText = "주 마감 취소하기"; btnClose.className = "w-full bg-slate-300 text-slate-700 font-bold py-3.5 rounded-xl transition text-sm shadow-md"; btnClose.disabled = false;
      } else {
        btnSave.style.display = 'block'; btnSave.innerText = isWeekSaved ? "주초 마감 취소하기" : "주초 마감하기 (저장하기)"; btnSave.className = isWeekSaved ? "w-full bg-slate-200 text-slate-600 font-bold py-3.5 rounded-xl transition text-sm shadow-md" : "w-full bg-slate-800 text-white font-bold py-3.5 rounded-xl transition text-sm shadow-md"; btnSave.disabled = false;
        btnClose.innerText = "주 마감하기 (저장하기)";
        if (!isWeekSaved) { btnClose.className = "w-full bg-slate-200 text-slate-400 font-bold py-3.5 rounded-xl transition text-sm cursor-not-allowed"; btnClose.disabled = true; } 
        else { btnClose.className = "w-full bg-[#ea580c] text-white font-bold py-3.5 rounded-xl transition text-sm shadow-md"; btnClose.disabled = false; }
      }
    }

    async function handleWeeklyAction(type) {
      if (type === 'close' && !isWeekSaved && !isWeekClosed) return; 
      const isCancelSave = (type === 'save' && isWeekSaved); const isCancelClose = (type === 'close' && isWeekClosed);
      const btn = document.getElementById(type === 'save' ? 'btn-save' : 'btn-close');

      if (isCancelSave || isCancelClose) {
        if(!confirm("취소하시겠습니까?")) return;
        btn.classList.add('btn-loading'); btn.innerText = "취소 중...";
        const res = await callApi({ action: 'cancel', type: type, empId: globalData.empId, currYear: weekContext.currYear, currWeek: weekContext.currWeek, nextYear: weekContext.nextYear, nextWeek: weekContext.nextWeek });
        if(res) { alert(res.message); statsCache = {}; await loadActivityData(); }
      } else {
        let empty = false; [...stages, '보험료'].forEach(s => { if(!document.getElementById(`input_currActual_${s}`).value.trim() || !document.getElementById(`input_nextPlan_${s}`).value.trim()) empty = true; });
        if(empty) { alert("결과 또는 예정 항목에 빈 항목이 있습니다."); return; }
        if(!confirm("저장하시겠습니까?")) return;
        btn.classList.add('btn-loading'); btn.innerText = "저장 중...";
        const payload = { empId: globalData.empId, name: globalData.name, teamName: globalData.teamName, currYear: weekContext.currYear, currWeek: weekContext.currWeek, nextYear: weekContext.nextYear, nextWeek: weekContext.nextWeek, currActualValues: getPayload(('currActual')), nextPlanValues: getPayload(('nextPlan')), isManualMode: globalData.isManualMode };
        const res = await callApi({ action: 'submit', type: type, payload: payload });
        if(res) { alert(res.message); statsCache = {}; await loadActivityData(); }
      }
      btn.classList.remove('btn-loading');
    }

    function getPayload(id) { let v = {}; stages.forEach(s => v[s] = document.getElementById(`input_${id}_${s}`).value); v['활동계'] = document.getElementById(`sum_${id}`).innerText; v['보험료'] = document.getElementById(`input_${id}_보험료`).value.replace(/[^0-9]/g, ''); return v; }

    function switchTab(id, btn) {
      document.querySelectorAll('#mainContentArea > div').forEach(el => el.classList.add('hidden-view'));
      document.getElementById(id).classList.remove('hidden-view');
      document.querySelectorAll('.nav-btn').forEach(el => { el.classList.replace('text-[#ea580c]', 'text-gray-400'); });
      btn.classList.replace('text-gray-400', 'text-[#ea580c]');
      document.getElementById('mainContentArea').scrollTop = 0;
      if(id === 'tab-stats') loadStatsData();
      if(id === 'tab-home') renderHomeDashboard();
    }

    async function prefetchStatsData() { const res = await callApi({ action: 'getStats', empId: globalData.empId, weeksLimit: document.getElementById('statsPeriod').value, year: weekContext.currYear, week: weekContext.currWeek }); if(res) statsCache[document.getElementById('statsPeriod').value] = { data: res, time: Date.now() }; }

    function renderHomeDashboard() {
      if (!lastFetchedData) return;
      const actual = lastFetchedData.currActual; const goals = globalData.goals || {};
      
      // [수정점] 결과를 진하게, 목표를 연하게 표시
      let html = [...stages, '활동계', '보험료'].map(s => {
        const gV = parseInt(String(goals[s]||'0').replace(/[^0-9]/g, '')) || 0; const aV = parseInt(String(actual[s]||'0').replace(/[^0-9]/g, '')) || 0;
        const ratio = gV > 0 ? Math.min(Math.round((aV/gV)*100), 100) : (aV>0?100:0);
        let color = 'bg-red-500'; if(ratio>=85) color='bg-emerald-500'; else if(ratio>=70) color='bg-amber-500';
        let dispA = s==='보험료' ? aV.toLocaleString()+'원' : aV.toLocaleString(); let dispG = s==='보험료' ? gV.toLocaleString()+'원' : gV.toLocaleString();
        
        return `<div class="space-y-1.5">
          <div class="flex justify-between text-[13px] font-bold text-slate-700">
            <span>${s}</span>
            <span class="font-bold text-slate-700">${dispA} <span class="text-slate-400 font-normal">/ ${dispG}</span></span>
          </div>
          <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden"><div class="${color} h-full transition-all duration-1000" style="width: ${ratio}%"></div></div>
        </div>`;
      }).join('');
      document.getElementById('home-progress-container').innerHTML = html;
      
      // [수정점] 다음주 예정 현황에도 목표치 표시 추가
      document.getElementById('home-next-status').innerHTML = ['AP','P','C','N'].map(s => {
        const pV = parseInt(lastFetchedData.nextPlan[s]) || 0;
        const gV = parseInt(String(goals[s]||'0').replace(/[^0-9]/g, '')) || 0;
        return `<div class="bg-white border border-slate-100 rounded-xl p-3 shadow-sm flex flex-col items-center justify-center">
          <span class="text-[10px] font-bold text-slate-400 mb-1">${s}</span>
          <div class="flex items-baseline space-x-1">
            <span class="text-[18px] font-black text-blue-600">${pV}</span>
            <span class="text-[11px] font-medium text-slate-400">/ ${gV}</span>
          </div>
        </div>`;
      }).join('');
    }

    async function loadStatsData() {
      const limit = document.getElementById('statsPeriod').value;
      if (statsCache[limit] && (Date.now() - statsCache[limit].time < CACHE_TTL)) { renderStats(statsCache[limit].data); return; }
      document.getElementById('statsGrid').innerHTML = '<p class="text-center py-10 text-slate-400 text-xs">데이터 계산 중...</p>';
      const res = await callApi({ action: 'getStats', empId: globalData.empId, weeksLimit: limit, year: weekContext.currYear, week: weekContext.currWeek });
      if(res) { statsCache[limit] = { data: res, time: Date.now() }; renderStats(res); }
    }

    function renderStats(data) {
      const getC = (v) => v>=85?'text-emerald-600':(v>=70?'text-amber-500':'text-red-700'); const getB = (v) => v>=85?'bg-emerald-500':(v>=70?'bg-amber-500':'bg-red-600');
      const renderBar = (s) => {
        const d = data.stats[s]; const r = d.plan>0?Math.round((d.actual/d.plan)*100):0;
        return `<div class="flex items-center space-x-3 mb-3"><div class="w-[50px] text-right text-[13px] font-extrabold text-slate-600">${s}</div><div class="flex-1 bg-slate-100 rounded-md h-6 relative overflow-hidden shadow-inner"><div class="${getB(r)} h-full rounded-md transition-all duration-700 ease-out" style="width: ${Math.min(r,100)}%"></div></div><div class="w-12 text-right text-[13px] font-black ${getC(r)}">${r}%</div></div>`;
      };
      document.getElementById('statsGrid').innerHTML = stages.map(renderBar).join('') + `<div class="my-5 border-t border-slate-200 border-dashed"></div>` + ['활동계','보험료'].map(renderBar).join('');
      const convs = [{l:'주간 유실적률',v:data.conversions.weekly_active,hl:true},{l:'TA / AP',v:data.conversions.ta_ap,hl:true},{l:'AP / N',v:data.conversions.ap_n,hl:true},{l:'AP / 소개',v:data.conversions.ap_intro,hl:true},{l:'AP / P',v:data.conversions.ap_p,hl:false},{l:'P / N',v:data.conversions.p_n,hl:false},{l:'C / N',v:data.conversions.c_n,hl:false},{l:'TA / N',v:data.conversions.ta_n,hl:false}];
      document.getElementById('convGrid').innerHTML = convs.map(c => `<div class="rounded-xl p-3 flex flex-col justify-center shadow-sm ${c.hl?'bg-orange-50/50 ring-1 ring-orange-200':'bg-white border-slate-200 border'}"><div class="flex justify-between items-end mb-2"><span class="text-[13px] font-extrabold text-slate-700 tracking-tight">${c.l}</span><span class="text-[13px] font-black ${getC(c.v)} leading-none">${c.v}%</span></div><div class="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden"><div class="${getB(c.v)} h-full rounded-full transition-all duration-700 ease-out" style="width: ${Math.min(c.v,100)}%"></div></div></div>`).join('');
    }
  </script>

  <script>
    if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Registration failed: ', err)); }); }
  </script>
</body>
</html>
